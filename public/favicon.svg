<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0f0f1a"/>
  <!-- Outer ring -->
  <circle cx="32" cy="34" r="20" stroke="#667eea" stroke-width="3" fill="none"/>
  <!-- Inner ring accent -->
  <circle cx="32" cy="34" r="20" stroke="#00cc88" stroke-width="3" fill="none"
    stroke-dasharray="40 86" stroke-dashoffset="0" stroke-linecap="round"/>
  <!-- Clock hand -->
  <line x1="32" y1="34" x2="32" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="34" x2="42" y2="40" stroke="#00cc88" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="2.5" fill="#ffffff"/>
  <!-- Crown / top buttons -->
  <rect x="27" y="10" width="10" height="4" rx="2" fill="#667eea"/>
  <rect x="20" y="11" width="6" height="3" rx="1.5" fill="#4a5568" transform="rotate(-25 23 12.5)"/>
</svg>
