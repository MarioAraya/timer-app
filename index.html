<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#667eea" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HIIT &amp; Tabata Timer" />
    <meta property="og:description" content="High-intensity interval training with precision audio sync. HIIT, Tabata, Pomodoro &amp; breathing timers." />
    <meta property="og:image" content="https://timer-app-livid-psi.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://timer-app-livid-psi.vercel.app" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HIIT &amp; Tabata Timer" />
    <meta name="twitter:description" content="High-intensity interval training with precision audio sync." />
    <meta name="twitter:image" content="https://timer-app-livid-psi.vercel.app/og-image.png" />
    <!-- Google Fonts: Lexend and Material Symbols (preload for faster load) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
    <style>
      /* Hide icon text until font loads */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        visibility: hidden;
      }
      .fonts-loaded .material-symbols-outlined {
        visibility: visible;
      }
    </style>
    <title>HIIT &amp; Tabata Timer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Detect when Material Symbols font is loaded
      if (document.fonts) {
        document.fonts.ready.then(() => {
          document.body.classList.add('fonts-loaded');
        });
      } else {
        // Fallback for older browsers
        setTimeout(() => document.body.classList.add('fonts-loaded'), 500);
      }
    </script>
  </body>
</html>
