<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cc88" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00cc88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="250" cy="315" rx="320" ry="320" fill="url(#glow1)"/>
  <ellipse cx="950" cy="315" rx="280" ry="280" fill="url(#glow2)"/>

  <!-- Timer circle -->
  <circle cx="820" cy="315" r="190" stroke="#667eea" stroke-width="6" fill="none" opacity="0.4"/>
  <circle cx="820" cy="315" r="190" stroke="#00cc88" stroke-width="6" fill="none"
    stroke-dasharray="480 715" stroke-dashoffset="0" stroke-linecap="round" opacity="0.9"/>
  <circle cx="820" cy="315" r="160" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.06"/>

  <!-- Clock hands -->
  <line x1="820" y1="315" x2="820" y2="165" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <line x1="820" y1="315" x2="930" y2="380" stroke="#00cc88" stroke-width="7" stroke-linecap="round"/>
  <circle cx="820" cy="315" r="10" fill="#ffffff"/>

  <!-- Tick marks -->
  <line x1="820" y1="130" x2="820" y2="148" stroke="#667eea" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="1005" y1="315" x2="987" y2="315" stroke="#667eea" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="635" y1="315" x2="653" y2="315" stroke="#667eea" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="820" y1="500" x2="820" y2="482" stroke="#667eea" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Left content -->
  <!-- Badge -->
  <rect x="80" y="180" width="170" height="36" rx="18" fill="#667eea" fill-opacity="0.2" stroke="#667eea" stroke-width="1.5"/>
  <text x="165" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#667eea" text-anchor="middle" letter-spacing="2">WORKOUT TIMERS</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">HIIT &amp;</text>
  <text x="80" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">Tabata</text>
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a0aec0">Timer</text>

  <!-- Subtitle -->
  <text x="80" y="498" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#718096">High-intensity interval training</text>
  <text x="80" y="526" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#718096">with precision audio sync</text>

  <!-- Pill tags -->
  <rect x="80" y="558" width="90" height="30" rx="15" fill="#00cc88" fill-opacity="0.15" stroke="#00cc88" stroke-width="1"/>
  <text x="125" y="578" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#00cc88" text-anchor="middle" font-weight="600">HIIT</text>

  <rect x="182" y="558" width="100" height="30" rx="15" fill="#ff6b35" fill-opacity="0.15" stroke="#ff6b35" stroke-width="1"/>
  <text x="232" y="578" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ff6b35" text-anchor="middle" font-weight="600">TABATA</text>

  <rect x="294" y="558" width="120" height="30" rx="15" fill="#667eea" fill-opacity="0.15" stroke="#667eea" stroke-width="1"/>
  <text x="354" y="578" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#667eea" text-anchor="middle" font-weight="600">POMODORO</text>
</svg>
