---
# Pipeline 1: unit tests — corre en TODAS las branches
# Reporta status a Gitea → permite branch protection en main
kind: pipeline
type: docker
name: test

trigger:
  event:
    - push
    - pull_request

steps:
  - name: unit-tests
    image: node:22-alpine
    commands:
      - npm ci --prefer-offline
      - npm test

---
# Pipeline 2: build + deploy + e2e smoke — solo en main y release
kind: pipeline
type: docker
name: deploy-timer-app

trigger:
  branch:
    - main
    - release
  event:
    - push
    - custom

steps:
  - name: build-and-push
    image: plugins/docker
    settings:
      repo: 192.168.0.103:5000/maaya/timer-app
      registry: 192.168.0.103:5000
      insecure: true
      tags:
        - latest
        - ${DRONE_COMMIT_SHA:0:8}

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: 192.168.0.104
      username: maaya
      key:
        from_secret: ssh_key
      script:
        - docker pull 192.168.0.103:5000/maaya/timer-app:latest
        - docker stop timer-app || true
        - docker rm timer-app || true
        - docker run -d --name timer-app
            --network traefik-net
            --restart unless-stopped
            --label "traefik.enable=true"
            --label "traefik.http.routers.timers.rule=Host(\`timers.lab\`)"
            --label "traefik.http.routers.timers.entrypoints=web"
            --label "traefik.http.services.timers.loadbalancer.server.port=80"
            -v /home/maaya/audio:/usr/share/nginx/html/audio
            192.168.0.103:5000/maaya/timer-app:latest
    depends_on:
      - build-and-push

  - name: e2e-smoke
    image: 192.168.0.103:5000/maaya/playwright-e2e:latest
    pull: if-not-exists
    environment:
      BASE_URL: http://192.168.0.104:5177
      CI: "true"
    depends_on:
      - deploy
